name = "asset-mgmt-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# RS_OFFICE_URL = "https://rsoffice-users-api.rumsan.workers.dev"
RS_OFFICE_URL = "https://rsoffice-users-api.rumsan.xyz"

# RS_OFFICE_APP_ID and RS_OFFICE_APP_PRIVATE_KEY are Worker Secrets.
# Set them via: wrangler secret put RS_OFFICE_APP_ID
#               wrangler secret put RS_OFFICE_APP_PRIVATE_KEY

[[d1_databases]]
binding = "DB"
database_name = "asset-mgmt"
database_id = "placeholder-replace-after-create"
migrations_dir = "../../packages/db/migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "assets"

[dev]
port = 8787
